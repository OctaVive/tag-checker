<div
  id="apply-status"
  hx-get="/apply/status"
  hx-trigger="every 400ms"
  hx-swap="outerHTML"
>
  <p class="mb-2">
    Updating tags…
    <span class="muted">
      {{ job.processed }} processed
      {% if job.current_file %} — {{ job.current_file }}{% endif %}
    </span>
  </p>
  <div class="progress mb-2" style="height: 0.6rem; background: #121a26;">
    <div
      class="progress-bar progress-bar-striped progress-bar-animated"
      role="progressbar"
      style="width: 100%; background: var(--accent);"
    ></div>
  </div>
  <p class="small muted mb-0">
    Updated: {{ job.updated }} · Skipped: {{ job.skipped }} · Failed: {{ job.failed }}
  </p>
</div>
