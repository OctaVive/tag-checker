<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FLAC AlbumArtist Editor{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --panel-border: #2a3a4f;
      --accent: #3d9cf0;
      --accent-soft: rgba(61, 156, 240, 0.15);
      --text: #e8eef5;
      --muted: #8a9bb0;
      --success: #3ecf8e;
      --warn: #e8b84a;
      --danger: #e85a5a;
    }
    body {
      background: linear-gradient(160deg, #0f1419 0%, #152030 50%, #0f1419 100%);
      color: var(--text);
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
    }
    .app-header {
      border-bottom: 1px solid var(--panel-border);
      background: rgba(26, 35, 50, 0.85);
      backdrop-filter: blur(8px);
    }
    .app-header h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 0.5rem;
    }
    .panel-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .folder-tree {
      max-height: 420px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .folder-node {
      user-select: none;
    }
    .folder-row {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.35rem;
      border-radius: 0.25rem;
    }
    .folder-row:hover {
      background: var(--accent-soft);
    }
    .folder-toggle {
      width: 1.25rem;
      height: 1.25rem;
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 0;
      line-height: 1;
      cursor: pointer;
      flex-shrink: 0;
    }
    .folder-toggle:disabled {
      visibility: hidden;
    }
    .folder-children {
      margin-left: 1.1rem;
      border-left: 1px solid var(--panel-border);
      padding-left: 0.35rem;
    }
    .folder-children.collapsed {
      display: none;
    }
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      min-height: 2rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--accent-soft);
      border: 1px solid rgba(61, 156, 240, 0.35);
      color: var(--text);
      border-radius: 999px;
      padding: 0.2rem 0.55rem 0.2rem 0.7rem;
      font-size: 0.8rem;
      max-width: 100%;
    }
    .chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .chip button {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 0;
      line-height: 1;
      cursor: pointer;
      font-size: 1rem;
    }
    .chip button:hover {
      color: var(--danger);
    }
    .table-dark-custom {
      --bs-table-bg: transparent;
      --bs-table-color: var(--text);
      --bs-table-border-color: var(--panel-border);
      --bs-table-striped-bg: rgba(255, 255, 255, 0.03);
      font-size: 0.85rem;
    }
    .table-dark-custom th {
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
    }
    .form-control, .form-control:focus {
      background: #121a26;
      border-color: var(--panel-border);
      color: var(--text);
    }
    .form-control:focus {
      box-shadow: 0 0 0 0.2rem var(--accent-soft);
      border-color: var(--accent);
    }
    .btn-accent {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover, .btn-accent:focus {
      background: #2d8adf;
      border-color: #2d8adf;
      color: #fff;
    }
    .btn-accent:disabled {
      opacity: 0.5;
    }
    .muted {
      color: var(--muted);
    }
    .stat-pill {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 0.35rem;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .stat-updated { background: rgba(62, 207, 142, 0.15); color: var(--success); }
    .stat-skipped { background: rgba(232, 184, 74, 0.15); color: var(--warn); }
    .stat-failed { background: rgba(232, 90, 90, 0.15); color: var(--danger); }
    .htmx-indicator {
      display: none;
    }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator {
      display: inline-block;
    }
    .path-hint {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .new-aa-cell {
      color: var(--accent);
      font-weight: 500;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header py-3 mb-4">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <h1>FLAC AlbumArtist Editor</h1>
        {% if music_root %}
        <span class="path-hint">{{ music_root }}</span>
        {% endif %}
      </div>
    </div>
  </header>
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
